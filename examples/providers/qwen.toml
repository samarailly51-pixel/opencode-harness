[model]
provider = "openai-compatible"
base_url = "https://dashscope.aliyuncs.com/compatible-mode"
model = "qwen-plus"
api_key_env = "DASHSCOPE_API_KEY"
temperature = 0.2
max_tokens = 2048

[agent]
max_steps = 8
context_chars = 8000

[permissions]
allow_write = false
allow_shell = true
allow_network = false
