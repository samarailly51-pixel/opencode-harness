name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests

      - name: Run mock eval smoke
        env:
          PYTHONPATH: src
        run: python -m opencode_harness eval examples/mock-suite.json --preset mock --max-steps 2 --context-chars 1000

      - name: Run DeepSeek Lab mock smoke
        env:
          PYTHONPATH: src
        run: python -m opencode_harness eval model-labs/deepseek/mock-smoke-suite.json --preset mock --max-steps 2 --context-chars 1000
